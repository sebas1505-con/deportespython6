<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de Cliente</title>
    {% load static %}
    <link rel="stylesheet" href="{% static 'css/registro.css' %}">
    <link rel="stylesheet" href="{% static 'css/alerts.css' %}">
</head>
<body>

<a href="{% url 'menu' %}" class="btn-volver-home">← Volver</a>

<div class="login-container">
    <div class="login-header">
        <h2>Registro de Cliente</h2>
        <p style="color:#666;font-size:14px;margin-top:6px;">
            Solo necesitas lo básico · Completa tu perfil después
        </p>
    </div>

    {% if messages %}
    <div id="alerts-container">
        {% for message in messages %}
            <div class="alerta {% if message.tags %}alerta--{{ message.tags }}{% endif %}">
                {{ message }}
                <button class="alerta-close" onclick="this.parentElement.style.display='none';">&times;</button>
            </div>
        {% endfor %}
    </div>
    {% endif %}

    <form method="POST" class="login-form">
    {% csrf_token %}

        <div>
            <label>Nombre Completo</label>
            <input type="text" name="first_name" placeholder="Ej: Juan Pérez" required>
        </div>

        <div>
            <label>Correo Electrónico</label>
            <input type="email" name="email" placeholder="correo@ejemplo.com" required>
        </div>

        <div>
            <label>Usuario</label>
            <input type="text" name="username" placeholder="nombre_usuario" required autocomplete="off">
        </div>

        <div>
            <label>Teléfono</label>
            <input type="text" name="telefono" placeholder="3001234567">
        </div>

        <div>
            <label>Contraseña</label>
            <input type="password" name="password" placeholder="Mínimo 8 caracteres" required>
        </div>

        <div>
            <label>Confirmar Contraseña</label>
            <input type="password" name="confirmar_password" placeholder="Repite la contraseña" required>
        </div>

        <button type="submit" class="btn-login">Registrarse</button>

        <p style="grid-column:span 2;text-align:center;font-size:13px;color:#666;margin-top:4px;">
            ¿Ya tienes cuenta?
            <a href="{% url 'login' %}" style="color:#007bff;font-weight:bold;">Inicia sesión</a>
        </p>

    </form>
</div>

</body>
</html>
