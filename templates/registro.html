<!DOCTYPE html>
<html>
<head>
    <title>Registro de Cliente</title>
    {% load static %}
    <link rel="stylesheet" href="{% static 'css/registro.css' %}">
    <link rel="stylesheet" href="{% static 'css/alerts.css' %}">
</head>
<body>

<div class="login-container">
    <div class="login-header">
        <h2>Registro de Cliente</h2>
    </div>

    {% if messages %}
    <div id="alerts-container">
        {% for message in messages %}
            <div class="alerta 
                {% if message.tags %}alerta--{{ message.tags }}{% endif %}">
                {{ message }}
                <button class="alerta-close" onclick="this.parentElement.style.display='none';">&times;</button>
            </div>
        {% endfor %}
    </div>
    {% endif %}

    <!-- Mensajes tipo growl -->
    {% if messages %}
        {% for message in messages %}
            <div class="alert">
                {{ message }}
            </div>
        {% endfor %}
    {% endif %}

    <form method="POST" class="login-form">
    {% csrf_token %}

    <label>Nombre Completo:</label>
    <input type="text" name="first_name" required>

    <label>Cédula:</label>
    <input type="text" name="cedula" required>

    <label>Correo Electrónico:</label>
    <input type="email" name="email" required>

    <label>Usuario:</label>
    <input type="text" name="username" required>

    <label>Contraseña:</label>
    <input type="password" name="password" required>

    <label>Confirmar Contraseña:</label>
    <input type="password" name="confirmar_password" required>

    <label>Teléfono:</label>
    <input type="text" name="telefono">

    <label>Dirección:</label>
    <input type="text" name="direccion">

    <label>Fecha de nacimiento:</label>
    <input type="date" name="fecha_nacimiento">

    <label>Localidad:</label>
    <select id="localidad">
        <option value="">Seleccione localidad</option>
        <option value="Suba">Suba</option>
        <option value="Usaquen">Usaquén</option>
        <option value="Kennedy">Kennedy</option>
        <option value="Engativa">Engativá</option>
    </select>

    <label>Barrio:</label>
    <select name="barrio" id="barrio">
        <option value="">Seleccione barrio</option>
    </select>

    <button type="submit" class="btn-login">Registrarse</button>

<script>
document.getElementById("localidad").addEventListener("change", function() {
    const localidad = this.value;

    fetch(`/api/barrios-bogota/?localidad=${localidad}`)
        .then(response => response.json())
        .then(data => {
            const barrioSelect = document.getElementById("barrio");
            barrioSelect.innerHTML = '<option value="">Seleccione barrio</option>';

            data.forEach(b => {
                const option = document.createElement("option");
                option.value = b.nombre;
                option.textContent = b.nombre;
                barrioSelect.appendChild(option);
            });
        })
        .catch(error => console.error("Error:", error));
});
</script>

</form>

</div>

<a href="{% url 'menu' %}" class="btn-volver-home">Volver</a>

</body>
</html>
