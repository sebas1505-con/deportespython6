<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Acceso Denegado</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #1a1a2e, #16213e, #0f3460);
            color: #fff;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .card {
            background: rgba(255,255,255,0.1);
            padding: 40px;
            border-radius: 10px;
            text-align: center;
            box-shadow: 0 8px 20px rgba(0,0,0,0.5);
        }
        h2 {
            color: #ff4c4c;
            margin-bottom: 20px;
        }
        p {
            margin-bottom: 30px;
        }
        .btn {
            background: #ff4c4c;
            border: none;
            padding: 12px 25px;
            border-radius: 5px;
            color: #fff;
            font-size: 16px;
            cursor: pointer;
            transition: background 0.3s ease;
            text-decoration: none;
        }
        .btn:hover {
            background: #e63939;
        }
    </style>
</head>
<body>
    <div class="card">
        <h2>Acceso Denegado</h2>
        <p>Debe iniciar sesión para acceder a este contenido.</p>
        <a href="{% url 'index' %}" class="btn">Volver</a>
    </div>
</body>
</html>
