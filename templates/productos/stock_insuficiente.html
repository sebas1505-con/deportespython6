{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stock insuficiente - Deportes 360</title>
    <link rel="stylesheet" href="{% static 'css/admin.css' %}">
</head>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #f8f9fa, #e9ecef);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .mensaje-stock {
            background: #fff;
            padding: 40px 30px;
            border-radius: 16px;
            text-align: center;
            box-shadow: 0 6px 25px rgba(0,0,0,0.15);
            max-width: 520px;
            width: 90%;
        }
        .mensaje-stock .icono {
            font-size: 60px;
            color: #d40000;
            margin-bottom: 15px;
        }
        .mensaje-stock h1 {
            color: #d40000;
            margin-bottom: 20px;
            font-size: 26px;
        }
        .mensaje-stock p {
            font-size: 17px;
            margin-bottom: 30px;
            color: #333;
        }
        .btn-volver {
            display: inline-block;
            background: linear-gradient(135deg, #d40000, #b30000);
            color: #fff;
            padding: 12px 28px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: bold;
            transition: transform 0.2s ease, background 0.3s ease;
        }
        .btn-volver:hover {
            background: linear-gradient(135deg, #b30000, #800000);
            transform: scale(1.05);
        }
    </style>
</head>
<body>
    <div class="mensaje-stock">
        <h1>¡Stock insuficiente!</h1>
        <p>
            El producto <strong>{{ producto_nombre }}</strong> en talla <strong>{{ talla }}</strong>
            solo tiene <strong>{{ stock_disponible }}</strong> unidades disponibles.
        </p>
        <a href="{% url 'carrito' %}" class="btn-volver">Volver al carrito</a>
    </div>
</body>
</html>
