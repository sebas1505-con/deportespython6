{% load static %}

<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Registro Administrador</title>
<link rel="stylesheet" href="{% static 'css/crear-admin.css' %}">

</head>

<body>

<div class="login-container">

```
<div class="login-header">
    <h2>Registro de Administrador</h2>
    <img src="{% static 'images/logo-deporte.png' %}" alt="Logo">
</div>

<form class="login-form" method="POST" action="{% url 'crear_admin' %}">

    {% csrf_token %}

    {% if error %}
    <div class="error">
        {{ error }}
    </div>
    {% endif %}

    <label>Nombre</label>
    <input type="text" name="first_name" placeholder="Tu nombre" required>

    <label>Usuario</label>
    <input type="text" name="usuario" placeholder="Crea tu usuario" required>

    <label>Correo</label>
    <input type="email" name="correo" placeholder="ejemplo@correo.com" required>

    <label>Teléfono</label>
    <input type="text" name="telefono" placeholder="300 000 0000" required>

    <label>Código administrador</label>
    <input type="text" name="codigo" placeholder="ADM-000" required>

    <label>Contraseña</label>
    <input type="password" name="contrasena" placeholder="Crea una contraseña" required>

    <label>Confirmar contraseña</label>
    <input type="password" name="confirmar" placeholder="Repite la contraseña" required>

    <label>Fecha de nacimiento</label>
    <input type="date" name="fecha_nacimiento">

    <label>Tipo de Documento:</label>
    <select name="tipo_documento" required>
        <option value="">Seleccione</option>
        <option value="CC">Cédula de Ciudadanía</option>
        <option value="TI">Tarjeta de Identidad</option>
        <option value="CE">Cédula de Extranjería</option>
        <option value="PAS">Pasaporte</option>
    </select>

    <label>Número de Documento:</label>
    <input type="text" name="cedula" required>

    <label>Localidad:</label>
    <select name="localidad" id="localidad">
        <option value="">Seleccione</option>
        <option value="Suba">Suba</option>
        <option value="Usaquen">Usaquén</option>
        <option value="Kennedy">Kennedy</option>
        <option value="Engativa">Engativá</option>
    </select>

    <label>Barrio:</label>
    <select name="barrio" id="barrio"></select>

    <button type="submit">
        Registrarse
    </button>
<script>
document.getElementById("localidad").addEventListener("change", function() {
    const localidad = this.value;

    fetch(`/api/barrios-bogota/?localidad=${localidad}`)
        .then(response => response.json())
        .then(data => {
            const barrioSelect = document.getElementById("barrio");
            barrioSelect.innerHTML = '<option value="">Seleccione barrio</option>';

            data.forEach(b => {
                const option = document.createElement("option");
                option.value = b.nombre;
                option.textContent = b.nombre;
                barrioSelect.appendChild(option);
            });
        });
});
</script>

</form>

<a href="{% url 'menu' %}" class="btn-volver-home">
    ⬅ Volver
</a>
```

</div>

</body>

</html>
