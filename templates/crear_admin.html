{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Formulario de Registro</title>
    <link rel="stylesheet" href="{% static 'css/crear-admin.css' %}">
</head>

<body>

<div class="login-container">

    <div class="login-header">
        <h2>Formulario de Registro</h2>

        <!-- Imagen de cabecera -->
        <img src="{% static 'images/logo-deporte.png' %}" alt="Logo">
    </div>

    <form class="login-form" method="POST">
        {% csrf_token %}

        <!-- Aquí luego pondrás mensajes -->
        <!-- {{ messages }} -->

        <!-- Usuario -->
        <label for="usuario">Usuario</label>
        <input type="text" id="usuario" name="usuario"
               placeholder="Crea tu usuario" required>

        <!-- Correo -->
        <label for="correo">Correo</label>
        <input type="email" id="correo" name="correo"
               placeholder="ejemplo@correo.com" required>

        <!-- Teléfono -->
        <label for="telefono">Teléfono</label>
        <input type="text" id="telefono" name="telefono"
               placeholder="+57 300 000 0000" required>

        <!-- Código -->
        <label for="codigo">Código</label>
        <input type="text" id="codigo" name="codigo"
               placeholder="ADM-000" required>

        <!-- Contraseña -->
        <label for="contrasena">Contraseña</label>
        <input type="password" id="contrasena" name="contrasena"
               placeholder="Crea una contraseña" required>

        <!-- Confirmar contraseña -->
        <label for="confirmar">Confirmar Contraseña</label>
        <input type="password" id="confirmar" name="confirmar"
               placeholder="Repite tu contraseña" required>

        <!-- Botón -->
        <button type="submit" class="btn btn-success">
            Registrarse
        </button>

    </form>

    <!-- Volver -->
    <a href="menu" class="btn-volver-home">
        Volver
    </a>

</div>

</body>
</html>
