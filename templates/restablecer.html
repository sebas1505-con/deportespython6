{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recuperar Contraseña</title>
    <link rel="icon" type="image/x-icon" href="{% static 'images/Cuenta.png' %}">
    <link rel="stylesheet" href="{% static 'css/recuperar-con.css' %}">
</head>

<body>

<div class="recover-container">

    <div class="recover-header">
        <img src="{% static 'images/Logo.png' %}" class="logo" alt="Logo">
        <h2>Recuperar Contraseña</h2>
        <p class="subtitle">Ingresa tu correo para recibir un enlace de recuperación</p>
    </div>

    <form method="POST" class="recover-form">
        {% csrf_token %}

        <label for="correo">Correo electrónico:</label>
        <input type="email" id="correo" name="email" placeholder="ejemplo@correo.com" required>

        <button type="submit" class="btn-recover">
            Enviar correo de confirmación
        </button>

        {% if messages %}
            {% for message in messages %}
                <div class="alert {{ message.tags }}">{{ message }}</div>
            {% endfor %}
        {% endif %}
    </form>

    <div class="recover-footer">
        <a href="{% url 'login' %}" class="back-link">Volver al login</a>
    </div>

</div>

</body>
</html>
