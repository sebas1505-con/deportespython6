{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Restablecer Contraseña</title>

<link rel="stylesheet" href="{% static 'css/nueva_contrasena.css' %}">
</head>

<body>

<div class="container">

    <div class="card">

        <img src="{% static 'images/Cuenta.png' %}" class="logo">

        <h2>Restablecer Contraseña</h2>
        <p class="subtitle">Ingresa tu nueva contraseña para continuar</p>

        {% if messages %}
            {% for message in messages %}
                <div class="alert {{ message.tags }}">{{ message }}</div>
            {% endfor %}
        {% endif %}

        <form method="POST">
            {% csrf_token %}

            <div class="input-group">
                <input type="password" name="password" id="password" required>
                <label>Nueva contraseña</label>
            </div>

            <div class="input-group">
                <input type="password" name="confirm_password" id="confirm_password" required>
                <label>Confirmar contraseña</label>
            </div>

            <button type="submit">Guardar contraseña</button>

        </form>

        <a href="{% url 'login' %}" class="back">← Volver al login</a>

    </div>

</div>

<script>
const form = document.querySelector('form');
const pass = document.getElementById('password');
const confirm = document.getElementById('confirm_password');

form.addEventListener('submit', (e) => {
    if (pass.value !== confirm.value) {
        e.preventDefault();
        alert("Las contraseñas no coinciden");
    }
});
</script>

</body>
</html>
