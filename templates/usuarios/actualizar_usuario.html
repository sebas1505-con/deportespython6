<!DOCTYPE html>
<html>
<head>
    <title>Actualizar Datos</title>

    <style>

        body{
            font-family: Arial;
            background:#f2f2f2;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
        }

        .contenedor{
            background:white;
            padding:30px;
            border-radius:10px;
            width:400px;
            box-shadow:0px 0px 10px rgba(0,0,0,0.2);
        }

        h2{
            text-align:center;
        }

        input{
            width:100%;
            padding:10px;
            margin:10px 0;
            border-radius:5px;
            border:1px solid #ccc;
        }

        button{
            width:100%;
            padding:10px;
            background:#28a745;
            border:none;
            color:white;
            font-size:16px;
            border-radius:5px;
            cursor:pointer;
        }

        button:hover{
            background:#218838;
        }

    </style>

</head>

<body>

<div class="contenedor">

<h2>Actualizar Datos</h2>

<form method="POST">
    {% csrf_token %}
    {{ form.as_p }}

    <button type="submit">
        Guardar Cambios
    </button>
</form>

</div>

</body>
</html>
