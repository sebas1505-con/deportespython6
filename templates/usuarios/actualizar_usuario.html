<!DOCTYPE html>
<html>
<head>
<title>Actualizar Datos</title>

<style>

body{
margin:0;
padding:0;
font-family:'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;

background:url("../static/images/Fondo3.png") no-repeat center center fixed;
background-size:cover;

display:flex;
justify-content:center;
align-items:center;

height:100vh;
}

/* tarjeta del formulario */

.contenedor{

background:rgba(255,255,255,0.95);

padding:35px;

border-radius:15px;

width:420px;

box-shadow:0 8px 20px rgba(0,0,0,0.25);

backdrop-filter:blur(6px);

}

/* titulo */

h2{

text-align:center;

margin-bottom:25px;

color:#222;

}

/* inputs */

input{

width:100%;

padding:12px;

margin:10px 0;

border-radius:8px;

border:2px solid #ddd;

font-size:15px;

transition:0.3s;

}

input:focus{

border-color:#a74a4a;

outline:none;

}

/* boton */

button{

width:100%;

padding:12px;

background:#a74a4a;

border:none;

color:white;

font-size:16px;

border-radius:8px;

cursor:pointer;

font-weight:bold;

transition:0.3s;

}

button:hover{

background:#bf0f0f;

}

/* link volver */

.volver{

display:block;

text-align:center;

margin-top:15px;

text-decoration:none;

color:#555;

}

.volver:hover{

color:#a74a4a;

}

</style>

</head>

<body>

<div class="contenedor">

<h2>Actualizar Datos</h2>

<form method="POST">

{% csrf_token %}

{{ form.as_p }}

<button type="submit">
Guardar Cambios
</button>

</form>

<a href="{% url 'perfil' %}" class="volver">
Volver al perfil
</a>

</div>

</body>
</html>
