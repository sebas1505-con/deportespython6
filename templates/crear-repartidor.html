<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro Repartidor — Deportes 360</title>
    {% load static %}
    <link rel="stylesheet" href="{% static 'css/alerts.css' %}">
    <link rel="stylesheet" href="{% static 'css/crear.repartidor.css' %}">
</head>
<body>

<a href="{% url 'menu' %}" class="btn-volver-home">← Volver</a>

<div class="login-container">
    <div class="login-header">
        <img src="{% static 'images/logo-deporte.png' %}" alt="Logo" class="logo"/>
        <h2>Registro Repartidor</h2>
        <p style="color:#666;font-size:14px;margin-top:6px;">
            Completa los datos básicos para empezar
        </p>
    </div>

    {% if messages %}
        {% for message in messages %}
            <div class="alert">{{ message }}</div>
        {% endfor %}
    {% endif %}

    <form method="POST" class="login-form">
        {% csrf_token %}

        <div>
            <label>Nombre Completo</label>
            <input type="text" name="first_name" placeholder="Ej: Juan Pérez" required>
        </div>

        <div>
            <label>Correo Electrónico</label>
            <input type="email" name="email" placeholder="correo@ejemplo.com" required>
        </div>

        <div>
            <label>Usuario</label>
            <input type="text" name="username" placeholder="nombre_usuario" required autocomplete="off">
        </div>

        <div>
            <label>Teléfono</label>
            <input type="text" name="telefono" placeholder="3001234567" required>
        </div>

        <div>
            <label>Contraseña</label>
            <input type="password" name="password" placeholder="Mínimo 8 caracteres" required>
        </div>

        <div>
            <label>Confirmar Contraseña</label>
            <input type="password" name="confirmar" placeholder="Repite la contraseña" required>
        </div>

        <div>
            <label>Tipo de Vehículo</label>
            <select name="vehiculo" required>
                <option value="">Seleccione</option>
                <option value="Moto">Moto</option>
                <option value="Bicicleta">Bicicleta</option>
                <option value="Carro">Carro</option>
                <option value="Patineta">Patineta eléctrica</option>
            </select>
        </div>

        <div>
            <label>Número de Placa</label>
            <input type="text" name="placa" placeholder="Ej: ABC123" required>
        </div>

        <button type="submit" class="btn-login">Registrarse como Repartidor</button>

        <p style="grid-column:span 2;text-align:center;font-size:13px;color:#666;margin-top:4px;">
            ¿Ya tienes cuenta?
            <a href="{% url 'login' %}" style="color:#007bff;font-weight:bold;">Inicia sesión</a>
        </p>

    </form>
</div>

</body>
</html>
